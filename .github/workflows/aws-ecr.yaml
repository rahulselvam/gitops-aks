name: "Build and push Docker image to AWS ECR"
 
on:
  workflow_dispatch:
#  push:
#    branches:
#      - main 
 
# env:
#    VERSION: $(( $(cat version.txt) + 1 ))

permissions:
  id-token: write   # This is required for requesting the JWT
  contents: read    # This is required for actions/checkout
  
jobs:
  
  build_push_supermario_docker_image:
    runs-on: ubuntu-latest
 
    steps:   
      - name: Checkout repo
        uses: actions/checkout@v4
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4 # More information on this action can be found below in the 'AWS Credentials' section
        with:
          role-to-assume: arn:aws:iam::059032601734:role/github-actions-trust-role
          aws-region: us-east-2

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push docker image to Amazon ECR
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: gitops/aws-ecr
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -f dockerfile-for-mario-project-in-gitops-repo-main/Dockerfile -t 059032601734.dkr.ecr.us-east-2.amazonaws.com/gitops/aws-ecr:v${{ github.run_number }} .
          docker push 059032601734.dkr.ecr.us-east-2.amazonaws.com/gitops/aws-ecr:v${{ github.run_number }}
          


