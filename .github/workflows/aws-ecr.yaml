name: "Build and push Super Mario Docker image with dynamic tag to AWS ECR"
 
on:
  workflow_dispatch:
  push:
    branches:
      - main 
 
env:
  VERSION: $(( $(cat version.txt) + 1 ))
  
jobs:
  
  build_push_supermario_docker_image:
    runs-on: ubuntu-latest
 
    steps:   
      # - name: Calculate and Set Version Env
      #   run: |
      #     CURRENT_VERSION=$(cat version.txt)
      #     NEW_VERSION=$((CURRENT_VERSION + 1))
      #     echo "VERSION=$NEW_VERSION" >> $GITHUB_ENV
      
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4 # More information on this action can be found below in the 'AWS Credentials' section
        with:
          role-to-assume: arn:aws:iam::059032601734:role/github-actions-trust-role
          aws-region: us-east-2

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push docker image to Amazon ECR
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: gitops/aws-ecr
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -f dockerfile-for-mario-project-in-gitops-repo-main/Dockerfile -t 059032601734.dkr.ecr.us-east-2.amazonaws.com/gitops/aws-ecr:${{ env.VERSION }} .
          docker push 059032601734.dkr.ecr.us-east-2.amazonaws.com/gitops/aws-ecr:${{ env.VERSION }}
          


